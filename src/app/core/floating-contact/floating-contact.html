<aside class="floating-contact" aria-label="Quick contact options">
  <a
    class="contact-action contact-action--call"
    [href]="phoneHref"
    [attr.aria-label]="'Call Accoustic360 at ' + phoneNumber">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.2 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.32 1.77.6 2.61a2 2 0 0 1-.45 2.11L8 9.7a16 16 0 0 0 6.3 6.3l1.26-1.26a2 2 0 0 1 2.11-.45c.84.28 1.71.48 2.61.6A2 2 0 0 1 22 16.92z"></path>
    </svg>
    <span>Call</span>
  </a>

  <a
    class="contact-action contact-action--whatsapp"
    [href]="whatsappHref"
    target="_blank"
    rel="noopener"
    aria-label="Chat with Accoustic360 on WhatsApp">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M20.52 3.48A11.83 11.83 0 0 0 12.1 0C5.55 0 .22 5.33.22 11.88c0 2.09.55 4.13 1.58 5.93L.12 24l6.34-1.66a11.88 11.88 0 0 0 5.64 1.44h.01c6.55 0 11.88-5.33 11.88-11.88 0-3.17-1.23-6.15-3.47-8.42z"></path>
      <path d="M12.1 21.76a9.86 9.86 0 0 1-5.03-1.38l-.36-.22-3.76.99 1-3.66-.24-.38a9.86 9.86 0 1 1 8.39 4.65z"></path>
      <path d="M17.5 14.39c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.07-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48s1.07 2.88 1.22 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.63.71.23 1.36.2 1.87.12.57-.09 1.76-.72 2-1.42.25-.7.25-1.29.17-1.42-.08-.12-.27-.2-.57-.35z"></path>
    </svg>
    <span>WhatsApp</span>
  </a>

  <a
    class="contact-action contact-action--email"
    [href]="emailHref"
    aria-label="Email Accoustic360">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <rect x="3" y="5" width="18" height="14" rx="2"></rect>
      <path d="m3 7 9 6 9-6"></path>
    </svg>
    <span>Email</span>
  </a>
</aside>
