<div class="nav-host">

  <!-- ─── STICKY HEADER ─────────────────────────────────────────── -->
  <header class="site-header" [class.scrolled]="isScrolled()">
    <div class="header-inner">

      <!-- Brand -->
      <a routerLink="/" class="brand" (click)="closeMenu()">
        <img src="assets/logo.png" alt="Accoustic360 Logo" />
      </a>

      <!-- Desktop navigation -->
      <nav class="desktop-nav" aria-label="Main navigation">
        <a routerLink="/"
           routerLinkActive="nav-active"
           [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/projects"   routerLinkActive="nav-active">Projects</a>
        <a routerLink="/products"   routerLinkActive="nav-active">Products</a>
        <a routerLink="/technology" routerLinkActive="nav-active">Technology</a>
        <a routerLink="/applications" routerLinkActive="nav-active">Applications</a>
      </nav>

      <!-- Right side actions -->
      <div class="header-actions">
        <a routerLink="/technology" class="cta-btn">Get Quote</a>

        <!-- Hamburger button -->
        <button
          class="hamburger"
          [class.is-open]="menuOpen()"
          (click)="toggleMenu()"
          aria-label="Toggle navigation menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── MOBILE DRAWER OVERLAY ─────────────────────────────────── -->
  <div
    class="drawer-overlay"
    [class.visible]="menuOpen()"
    (click)="closeMenu()"
    aria-hidden="true">
  </div>

  <!-- ─── MOBILE DRAWER ─────────────────────────────────────────── -->
  <aside class="drawer" [class.open]="menuOpen()" [attr.aria-hidden]="!menuOpen()">
    <div class="drawer-top">
      <img src="assets/logo.png" alt="Accoustic360" />
      <button class="drawer-close" (click)="closeMenu()" aria-label="Close menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="drawer-nav">
      <a routerLink="/"
         routerLinkActive="drawer-active"
         [routerLinkActiveOptions]="{ exact: true }"
         (click)="closeMenu()">
        <span class="drawer-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        Home
      </a>
      <a routerLink="/projects" routerLinkActive="drawer-active" (click)="closeMenu()">
        <span class="drawer-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </span>
        Projects
      </a>
      <a routerLink="/products" routerLinkActive="drawer-active" (click)="closeMenu()">
        <span class="drawer-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </span>
        Products
      </a>
      <a routerLink="/technology" routerLinkActive="drawer-active" (click)="closeMenu()">
        <span class="drawer-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        </span>
        Technology
      </a>
      <a routerLink="/applications" routerLinkActive="drawer-active" (click)="closeMenu()">
        <span class="drawer-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </span>
        Applications
      </a>
    </nav>

    <a routerLink="/technology" class="drawer-cta" (click)="closeMenu()">
      Get a Free Quote
    </a>
  </aside>

  <!-- ─── PAGE CONTENT ──────────────────────────────────────────── -->
  <ng-content></ng-content>

</div>
